<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seascape WASD</title>
<style>
    body { margin:0; overflow:hidden; background:black; }
    #info {
        position:absolute;
        bottom:20px;
        left:20px;
        color:white;
        font-family:Arial;
        font-size:13px;
        opacity:0.8;
    }
</style>
</head>
<body>
<div id="info">
    Кликни для захвата мыши<br>
    WASD — движение | Shift — ускорение | Мышь — обзор
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

/* =========================
   BASIC THREE SETUP
========================= */

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

/* =========================
   CAMERA STATE
========================= */

const cameraState = {
    position: new THREE.Vector3(0,3.5,5),
    yaw: 0,
    pitch: 0
};

/* =========================
   UNIFORMS
========================= */

const uniforms = {
    iTime: { value: 0 },
    iResolution: { value: new THREE.Vector3(window.innerWidth, window.innerHeight, 0) },
    cameraPos: { value: cameraState.position },
    cameraRot: { value: new THREE.Vector2(0,0) }
};

/* =========================
   SHADERS
========================= */

const vertexShader = `
varying vec2 vUv;
void main(){
    vUv = uv;
    gl_Position = vec4(position,1.0);
}
`;

const fragmentShader = `
precision highp float;
varying vec2 vUv;

uniform vec3 iResolution;
uniform float iTime;
uniform vec3 cameraPos;
uniform vec2 cameraRot;

const int NUM_STEPS = 32;
const float PI = 3.141592;
const float EPSILON = 1e-3;
#define EPSILON_NRM (0.1 / iResolution.x)

const int ITER_GEOMETRY = 3;
const int ITER_FRAGMENT = 5;
const float SEA_HEIGHT = 0.6;
const float SEA_CHOPPY = 4.0;
const float SEA_SPEED = 0.8;
const float SEA_FREQ = 0.16;
const vec3 SEA_BASE = vec3(0.0,0.09,0.18);
const vec3 SEA_WATER_COLOR = vec3(0.8,0.9,0.6)*0.6;

const mat2 octave_m = mat2(1.6,1.2,-1.2,1.6);

/* ===== noise ===== */

float hash(vec2 p){
    return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);
}

float noise(vec2 p){
    vec2 i=floor(p);
    vec2 f=fract(p);
    vec2 u=f*f*(3.0-2.0*f);
    return mix(mix(hash(i+vec2(0,0)),hash(i+vec2(1,0)),u.x),
               mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y)*2.-1.;
}

/* ===== lighting ===== */

float diffuse(vec3 n,vec3 l,float p){
    return pow(dot(n,l)*0.4+0.6,p);
}

float specular(vec3 n,vec3 l,vec3 e,float s){
    float nrm=(s+8.0)/(PI*8.0);
    return pow(max(dot(reflect(e,n),l),0.0),s)*nrm;
}

/* ===== sky ===== */

vec3 getSkyColor(vec3 e){
    e.y=(max(e.y,0.)*0.8+0.2)*0.8;
    return vec3(pow(1.-e.y,2.),1.-e.y,0.6+(1.-e.y)*0.4)*1.1;
}

/* ===== sea ===== */

float sea_octave(vec2 uv,float choppy){
    uv+=noise(uv);
    vec2 wv=1.-abs(sin(uv));
    vec2 swv=abs(cos(uv));
    wv=mix(wv,swv,wv);
    return pow(1.-pow(wv.x*wv.y,0.65),choppy);
}

float map(vec3 p){
    float freq=SEA_FREQ;
    float amp=SEA_HEIGHT;
    float choppy=SEA_CHOPPY;
    vec2 uv=p.xz; uv.x*=0.75;
    float d,h=0.;
    float sea_time=1.+iTime*SEA_SPEED;

    for(int i=0;i<ITER_GEOMETRY;i++){
        d=sea_octave((uv+sea_time)*freq,choppy);
        d+=sea_octave((uv-sea_time)*freq,choppy);
        h+=d*amp;
        uv*=octave_m;
        freq*=1.9;
        amp*=0.22;
        choppy=mix(choppy,1.,0.2);
    }
    return p.y-h;
}

float map_detailed(vec3 p){
    float freq=SEA_FREQ;
    float amp=SEA_HEIGHT;
    float choppy=SEA_CHOPPY;
    vec2 uv=p.xz; uv.x*=0.75;
    float d,h=0.;
    float sea_time=1.+iTime*SEA_SPEED;

    for(int i=0;i<ITER_FRAGMENT;i++){
        d=sea_octave((uv+sea_time)*freq,choppy);
        d+=sea_octave((uv-sea_time)*freq,choppy);
        h+=d*amp;
        uv*=octave_m;
        freq*=1.9;
        amp*=0.22;
        choppy=mix(choppy,1.,0.2);
    }
    return p.y-h;
}

/* ===== normal ===== */

vec3 getNormal(vec3 p,float eps){
    vec3 n;
    n.y=map_detailed(p);
    n.x=map_detailed(vec3(p.x+eps,p.y,p.z))-n.y;
    n.z=map_detailed(vec3(p.x,p.y,p.z+eps))-n.y;
    n.y=eps;
    return normalize(n);
}

/* ===== tracing ===== */

float heightMapTracing(vec3 ori,vec3 dir,out vec3 p){
    float tm=0.;
    float tx=1000.;
    float hx=map(ori+dir*tx);
    if(hx>0.){p=ori+dir*tx;return tx;}
    float hm=map(ori);

    for(int i=0;i<NUM_STEPS;i++){
        float tmid=mix(tm,tx,hm/(hm-hx));
        p=ori+dir*tmid;
        float hmid=map(p);
        if(hmid<0.){tx=tmid;hx=hmid;}
        else{tm=tmid;hm=hmid;}
        if(abs(hmid)<EPSILON)break;
    }
    return mix(tm,tx,hm/(hm-hx));
}

/* ===== sea color ===== */

vec3 getSeaColor(vec3 p,vec3 n,vec3 l,vec3 eye,vec3 dist){
    float fresnel=clamp(1.-dot(n,-eye),0.,1.);
    fresnel=min(fresnel*fresnel*fresnel,0.5);

    vec3 reflected=getSkyColor(reflect(eye,n));
    vec3 refracted=SEA_BASE+diffuse(n,l,80.)*SEA_WATER_COLOR*0.12;

    vec3 color=mix(refracted,reflected,fresnel);

    float atten=max(1.-dot(dist,dist)*0.001,0.);
    color+=SEA_WATER_COLOR*(p.y-SEA_HEIGHT)*0.18*atten;

    color+=specular(n,l,eye,60.);

    return color;
}

/* ===== main ===== */

void main(){

    vec2 fragCoord=vUv*iResolution.xy;
    vec2 uv=fragCoord/iResolution.xy;
    uv=uv*2.-1.;
    uv.x*=iResolution.x/iResolution.y;

    vec3 dir=normalize(vec3(uv,-2.));

    float yaw=cameraRot.x;
    float pitch=cameraRot.y;

    mat3 rotY=mat3(
        cos(yaw),0.,-sin(yaw),
        0.,1.,0.,
        sin(yaw),0.,cos(yaw)
    );

    mat3 rotX=mat3(
        1.,0.,0.,
        0.,cos(pitch),-sin(pitch),
        0.,sin(pitch),cos(pitch)
    );

    dir=rotY*rotX*dir;

    vec3 ori=cameraPos;

    vec3 p;
    heightMapTracing(ori,dir,p);

    vec3 dist=p-ori;
    vec3 n=getNormal(p,dot(dist,dist)*EPSILON_NRM);
    vec3 light=normalize(vec3(0.,1.,0.8));

    vec3 color=mix(
        getSkyColor(dir),
        getSeaColor(p,n,light,dir,dist),
        pow(smoothstep(0.,-0.02,dir.y),0.2)
    );

    gl_FragColor=vec4(pow(color,vec3(0.65)),1.);
}
`;

/* =========================
   MATERIAL
========================= */

const material = new THREE.ShaderMaterial({
    uniforms,
    vertexShader,
    fragmentShader
});

scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),material));

/* =========================
   CONTROLS
========================= */

const keys = {};
window.addEventListener('keydown',e=>keys[e.code]=true);
window.addEventListener('keyup',e=>keys[e.code]=false);

renderer.domElement.addEventListener('click',()=>{
    renderer.domElement.requestPointerLock();
});

document.addEventListener('mousemove',e=>{
    if(document.pointerLockElement===renderer.domElement){
        cameraState.yaw -= e.movementX*0.002;
        cameraState.pitch += e.movementY*0.002;
        cameraState.pitch=Math.max(-1.5,Math.min(1.5,cameraState.pitch));
    }
});

/* =========================
   RESIZE
========================= */

window.addEventListener('resize',()=>{
    renderer.setSize(window.innerWidth,window.innerHeight);
    uniforms.iResolution.value.set(window.innerWidth,window.innerHeight,0);
});

/* =========================
   ANIMATE
========================= */

function animate(){
    requestAnimationFrame(animate);

   const speed = keys['ShiftLeft'] ? 0.25 : 0.12;

// направление вперёд (с учётом поворота)
const forward = new THREE.Vector3(
    Math.sin(cameraState.yaw),
    0,
    Math.cos(cameraState.yaw)
);

// вправо
const right = new THREE.Vector3(
    forward.z,
    0,
    -forward.x
);

// вверх (мировая ось Y)
const up = new THREE.Vector3(0, 1, 0);

// движение
if(keys['KeyW']) cameraState.position.addScaledVector(forward, -speed);
if(keys['KeyS']) cameraState.position.addScaledVector(forward, speed);
if(keys['KeyA']) cameraState.position.addScaledVector(right, -speed);
if(keys['KeyD']) cameraState.position.addScaledVector(right, speed);

// ВВЕРХ / ВНИЗ
if(keys['Space']) cameraState.position.addScaledVector(up, speed);
if(keys['ControlLeft']) cameraState.position.addScaledVector(up, -speed);

    uniforms.cameraRot.value.set(cameraState.yaw,cameraState.pitch);
    uniforms.iTime.value += 0.016;

    renderer.render(scene,camera);
}

animate();
</script>
</body>
</html>
